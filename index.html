<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="src/main.css" />
    <script type="module" src="src/main.ts" defer></script>
  </head>
  <body class="min-h-svh grid">
    <main class="grid place-items-center bg-linear-to-t from-[#09203f] to-[#537895]">
      <section class="w-11/12 sm:w-full max-w-115 mx-auto p-3 space-y-3">
        <h1 class="text-center text-2xl text-zinc-50/90 text-shadow-sm text-shadow-white">Tic Tac Toe</h1>
        <h3 class="text-center text-xl text-zinc-50/90 text-shadow-md text-shadow-indigo-50 invisible">Awaiting Winner</h3>
        <div class="relative grid grid-cols-3 gap-3" id="game">
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="0" data-col="0"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="0" data-col="1"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="0" data-col="2"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="1" data-col="0"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="1" data-col="1"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="1" data-col="2"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="2" data-col="0"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="2" data-col="1"></button>
          <button type="button" class="cell aspect-square bg-zinc-50/70 rounded-2xl shadow-lg shadow-gray-800/60 text-3xl font-semibold" data-row="2" data-col="2"></button>
          <div class="absolute inset-0 backdrop-blur-lg grid place-items-center rounded-lg" id="selection">
            <div class="w-2/3 mx-auto aspect-square space-y-3 flex flex-col justify-evenly bg-zinc-700/40 rounded-lg border border-zinc-600 p-3">
              <span class="block text-center text-indigo-100 text-xl font-semibold uppercase">Pick your mark</span>
              <div class="flex justify-evenly items-center p-3 rounded-lg flex-wrap">
                <span class="text-4xl font-semibold text-red-600/70">X</span>
                <label class="relative inline-block w-12 h-6.5 cursor-pointer">
                  <input type="checkbox" class="peer opacity-0 w-0 h-0" id="mark" />
                  <span
                    class="absolute cursor-pointer inset-0 rounded-full bg-[#ed1111] transition-all duration-400 before:content-[''] before:absolute before:left-1 before:bottom-1 before:w-4.75 before:aspect-square before:rounded-full before:bg-[#FFF] before:transition-all before:duration-400 peer-checked:bg-[rgb(11,89,235)] peer-checked:before:translate-x-4.75"></span>
                </label>
                <span class="text-4xl font-semibold text-blue-700/70">O</span>

                <div class="basis-full mt-2.5 text-center">
                  <button
                    type="button"
                    class="font-medium bg-zinc-700/60 text-indigo-50 text-lg px-5 py-1.5 rounded-full transition-transform duration-300 active:translate-y-1 cursor-pointer"
                    id="startGame">
                    Start Game
                  </button>
                </div>
              </div>
              <span class="block text-center text-indigo-100 text-md font-semibold uppercase">Remember: X goes first</span>
            </div>
          </div>
        </div>
        <div class="flex gap-1.5 items-center bg-white/90 p-2 rounded-2xl">
          <img src="/stopwatch.svg" alt="stopwatch icon" width="30" height="30" />
          <div class="flex-1 relative h-3.75">
            <span
              class="absolute inset-0 w-full bg-linear-45 from-[hsl(124_95%_60%)] via-[hsl(160_95%_59%)] to-[hsl(202_96%_58%)] rounded-lg transition-transform duration-700"
              id="timebar"></span>
          </div>
        </div>
        <div class="text-center">
          <button type="button" class="p-3 bg-blue-400/80 text-xl rounded-lg text-indigo-200" id="playAgain" hidden>Play Again</button>
        </div>
      </section>
    </main>
  </body>
</html>
